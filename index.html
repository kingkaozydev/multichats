<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- SEO & Meta Tags -->
    <meta name="description" content="Multichat Ultimate: Acompanhe múltiplos chats de streamers da Twitch, Kick e YouTube simultaneamente.">
    <meta name="author" content="KaozyKing">
    <meta name="theme-color" content="#09090b">

    <title>Multichat Ultimate</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none'><path d='M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z' stroke='%23a5f3fc' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    
    <!-- React & Tailwind -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@400;900&family=Russo+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Inter"', 'sans-serif']
                    },
                    colors: {
                        background: '#09090b',
                        surface: '#121215',
                        accent: '#6366f1',
                        ice: '#a5f3fc',
                        kick: '#53fc18',
                        twitch: '#9146ff',
                        yt: '#ff0000'
                    },
                    animation: {
                        'aurora-1': 'aurora 20s infinite alternate',
                        'aurora-2': 'aurora 25s infinite alternate-reverse',
                        'slide-up': 'slideUp 0.3s ease-out forwards',
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
                        'modal-enter': 'modalEnter 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards'
                    },
                    keyframes: {
                        aurora: { '0%': { transform: 'translate(0, 0) rotate(0deg)' }, '100%': { transform: 'translate(10%, 10%) rotate(10deg)' } },
                        slideUp: { '0%': { transform: 'translateY(100%)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        fadeIn: { 'from': { opacity: '0' }, 'to': { opacity: '1' } },
                        pulseGlow: { '0%, 100%': { opacity: '0.6', filter: 'brightness(1)' }, '50%': { opacity: '1', filter: 'brightness(1.5) blur(1px)' } },
                        modalEnter: { '0%': { opacity: '0', transform: 'scale(0.95) translateY(10px)' }, '100%': { opacity: '1', transform: 'scale(1) translateY(0)' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #09090b; color: #e2e8f0; margin: 0; padding: 0; overflow: hidden; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.2); }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* Logo Positioning */
        .logo-container {
            position: fixed;
            left: 0;
            right: 0;
            z-index: 50;
            display: flex;
            justify-content: center;
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }
        .logo-normal { top: 6rem; transform: scale(1); opacity: 1; }
        .logo-hidden { top: -5rem; transform: scale(0.5); opacity: 0; pointer-events: none; }

        /* Container Modes */
        .chat-container { 
            height: 100dvh; 
            width: 100vw; 
            box-sizing: border-box;
            transition: padding 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .chat-container.empty-state { padding-top: 0; }
        .chat-container.active-state { padding: max(0.5rem, env(safe-area-inset-top)) 0.5rem 0.5rem 0.5rem; }

        .mode-grid { display: flex; flex-direction: row; overflow-x: auto; overflow-y: hidden; gap: 0.5rem; align-items: stretch; }
        .mode-list { display: flex; flex-direction: column; gap: 1rem; max-width: 800px; margin: 0 auto; overflow-y: auto; }
        .mode-focus { display: flex; flex-direction: column; overflow: hidden; padding-bottom: 0 !important; padding-left: 0 !important; padding-right: 0 !important; }
        
        .chat-hidden { position: absolute !important; opacity: 0 !important; pointer-events: none !important; width: 1px !important; height: 1px !important; z-index: -1 !important; transform: scale(0.01); }
        .chat-focused { flex: 1; width: 100%; height: 100%; max-height: 100%; border-radius: 0 !important; border: none !important; }
        
        .chat-card {
            display: flex; flex-direction: column; background: #0b0e11;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            overflow: hidden; position: relative; transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .mode-grid .chat-card { flex: 1; min-width: 350px; height: 100%; max-height: 100%; }
        .mode-list .chat-card { height: 600px; flex-shrink: 0; }
        .chat-card:hover { border-color: rgba(165,243,252,0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .fade-mask {
            mask-image: linear-gradient(to right, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, black 80%, transparent 100%);
        }

        .tech-gradient { background: linear-gradient(135deg, #6366f1 0%, #a5f3fc 100%); }

        @media (max-width: 768px) {
            .mode-grid { flex-direction: column; overflow-x: hidden; overflow-y: auto; }
            .mode-grid .chat-card { min-width: 100%; height: 60vh; margin-bottom: 1rem; }
            .mode-list .chat-card { height: 60vh; }
            .logo-normal { top: 4.5rem; transform: scale(0.85); }
            input { font-size: 16px !important; }
        }
        @media (min-width: 769px) { .mode-grid { flex-direction: row; } .mode-grid .chat-card { height: 100%; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Icons ---
        const XIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const PlusIcon = ({size=20}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const TwitchIcon = ({width=16, height=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={width} height={height} viewBox="0 0 24 24" fill="currentColor"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z"/></svg>;
        const YoutubeIcon = ({width=16, height=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={width} height={height} viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>;
        const KickIcon = ({width=16, height=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={width} height={height} viewBox="0 0 24 24" fill="currentColor"><path d="M14.615 13.923l4.385 5.538h-4.308l-3.385-4.462h-1.615v4.462H5v-14h4.692v4.846h1.615l3.23-4.846h4.385l-4.307 5.385z"/></svg>;
        const TrashIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const ExternalLinkIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>;
        const RefreshIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M3 21v-5h5"></path></svg>;
        const LogoML = ({w=24, h=24}) => <svg width={w} height={h} viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 19V5" stroke="white" strokeWidth="3" strokeLinecap="round" /><path d="M19 19V5" stroke="white" strokeWidth="3" strokeLinecap="round" /><path d="M5 5L12 13L19 5" stroke="#a5f3fc" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" /></svg>;
        const GridIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>;
        const ListIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>;
        const FocusIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3h18v18H3z"></path><path d="M12 8v8"></path><path d="M8 12h8"></path></svg>;
        const SearchIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
        const EyeOffIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>;
        const AlertCircleIcon = ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;

        const hostname = typeof window!=='undefined' && window.location.hostname ? window.location.hostname : "localhost";

        // --- Configuração das Plataformas ---
        const PLATFORMS = {
            twitch: { id: 'twitch', name: 'Twitch', color: 'text-[#9146ff]', bg: 'bg-[#9146ff]', border: 'border-[#9146ff]', icon: <TwitchIcon width={16} height={16}/>, placeholder: 'Ex: alanzoka ou link...' },
            kick: { id: 'kick', name: 'Kick', color: 'text-[#53fc18]', bg: 'bg-[#53fc18]', border: 'border-[#53fc18]', icon: <KickIcon width={16} height={16}/>, placeholder: 'Ex: paulinholoko ou link...' },
            youtube: { id: 'youtube', name: 'YouTube', color: 'text-[#ff0000]', bg: 'bg-[#ff0000]', border: 'border-[#ff0000]', icon: <YoutubeIcon width={16} height={16}/>, placeholder: 'Link da live, ID ou @Canal' }
        };

        // --- Tela de Carregamento (Loading Screen) ---
        const LoadingScreen = ({ isFadingOut }) => {
            return (
                <div className={`fixed inset-0 z-[200] bg-[#09090b] flex flex-col items-center justify-center transition-opacity duration-700 ease-in-out ${isFadingOut ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}>
                    
                    {/* Background Effects specifically for loading */}
                    <div className="absolute inset-0 z-0 pointer-events-none opacity-50">
                        <div className="absolute top-1/4 left-1/4 w-[50%] h-[50%] rounded-full bg-[#6366f1]/20 blur-[120px] mix-blend-screen animate-pulse"></div>
                        <div className="absolute bottom-1/4 right-1/4 w-[50%] h-[50%] rounded-full bg-[#a5f3fc]/20 blur-[120px] mix-blend-screen animate-pulse delay-700"></div>
                    </div>

                    <div className="flex flex-col items-center gap-5 z-10 animate-pulse-glow">
                        <div className="w-20 h-20 md:w-24 md:h-24 tech-gradient rounded-3xl flex items-center justify-center text-white shadow-[0_0_40px_rgba(99,102,241,0.5)] ring-2 ring-white/20">
                            <LogoML w={40} h={40} />
                        </div>
                        <h1 className="font-bold text-3xl md:text-4xl tracking-widest text-white leading-none font-display">MULTICHATS</h1>
                    </div>

                    <div className="absolute bottom-12 flex flex-col items-center animate-fade-in z-10" style={{animationDelay: '0.5s'}}>
                        <span className="text-[10px] md:text-xs text-gray-400 uppercase tracking-[0.4em] font-semibold mb-1">Desenvolvido por</span>
                        <span className="text-xl md:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-[#a5f3fc] via-[#6366f1] to-[#a5f3fc] font-display tracking-widest bg-[length:200%_auto] animate-[pulseGlow_3s_ease-in-out_infinite]">
                            KAOZYKING
                        </span>
                    </div>
                </div>
            );
        };

        // --- Modais ---
        const AddChatModal = ({ isOpen, onClose, onAdd }) => {
            const [platform, setPlatform] = useState('twitch');
            const [inputVal, setInputVal] = useState('');

            useEffect(() => {
                if (isOpen) { setInputVal(''); }
            }, [isOpen]);

            if (!isOpen) return null;

            const handleSubmit = (e) => {
                e.preventDefault();
                if(inputVal.trim()) {
                    onAdd(platform, inputVal);
                }
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fade-in" onMouseDown={(e) => {if(e.target === e.currentTarget) onClose()}}>
                    <div className="bg-[#121215] border border-white/10 rounded-2xl shadow-2xl max-w-md w-full overflow-hidden animate-modal-enter flex flex-col">
                        <div className="p-4 border-b border-white/5 flex items-center justify-between">
                            <h2 className="text-white font-bold text-lg flex items-center gap-2">
                                <PlusIcon size={18}/> Adicionar Novo Chat
                            </h2>
                            <button onClick={onClose} className="p-1.5 text-gray-400 hover:text-white hover:bg-white/10 rounded-lg transition-colors">
                                <XIcon size={18} />
                            </button>
                        </div>
                        
                        <form onSubmit={handleSubmit} className="p-5 flex flex-col gap-5">
                            <div className="grid grid-cols-3 gap-2">
                                {Object.values(PLATFORMS).map(p => (
                                    <button 
                                        key={p.id} type="button" onClick={() => setPlatform(p.id)}
                                        className={`flex flex-col items-center justify-center p-3 rounded-xl border transition-all ${platform === p.id ? `${p.bg}/20 ${p.border} ${p.color}` : 'border-white/5 bg-white/5 text-gray-500 hover:text-gray-300 hover:bg-white/10'}`}
                                    >
                                        <div className="mb-1">{p.icon}</div>
                                        <span className="text-[10px] font-bold uppercase tracking-wider">{p.name}</span>
                                    </button>
                                ))}
                            </div>

                            <div className="flex flex-col gap-1.5">
                                <label className="text-[10px] font-bold uppercase text-gray-500 tracking-wider">Usuário ou Link da {PLATFORMS[platform].name}</label>
                                <input 
                                    type="text" autoFocus value={inputVal} onChange={e => setInputVal(e.target.value)}
                                    placeholder={PLATFORMS[platform].placeholder}
                                    className={`w-full bg-black/50 border ${platform==='twitch'?'focus:border-[#9146ff]':platform==='kick'?'focus:border-[#53fc18]':'focus:border-[#ff0000]'} border-white/10 rounded-xl px-4 py-3 text-white text-sm outline-none transition-colors font-medium`}
                                />
                            </div>

                            <button type="submit" className={`w-full py-3 rounded-xl font-bold text-white shadow-lg transition-transform active:scale-95 ${PLATFORMS[platform].bg}`}>
                                Adicionar à Tela
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const YoutubeWarningModal = ({ isOpen, onClose, onConfirm }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fade-in">
                    <div className="bg-[#1a1d21] border border-[#ff0000]/30 rounded-xl shadow-2xl max-w-md w-full overflow-hidden animate-slide-up">
                        <div className="p-5 flex flex-col gap-4">
                            <div className="flex items-start gap-4">
                                <div className="w-12 h-12 rounded-full bg-[#ff0000]/10 flex items-center justify-center text-[#ff0000] shrink-0 border border-[#ff0000]/20">
                                    <AlertCircleIcon size={24} />
                                </div>
                                <div className="flex-1">
                                    <h3 className="text-white font-bold text-lg mb-1">Atenção: YouTube Chat</h3>
                                    <p className="text-gray-400 text-xs leading-relaxed">
                                        Para chats do YouTube, é necessário usar o <strong>ID ou Link da transmissão</strong> que está acontecendo AO VIVO agora.
                                        <br/><br/>
                                        Este botão adicionará apenas um exemplo. Se der erro, cole o link da live atual ou digite @NomeDoCanal.
                                    </p>
                                </div>
                            </div>
                            <div className="flex gap-3 mt-2">
                                <button onClick={onClose} className="flex-1 px-4 py-2.5 bg-white/5 hover:bg-white/10 text-gray-300 text-xs font-bold rounded-lg transition-colors">Cancelar</button>
                                <button onClick={onConfirm} className="flex-1 px-4 py-2.5 bg-[#ff0000] hover:bg-[#d00000] text-white text-xs font-bold rounded-lg shadow-lg shadow-red-900/20 transition-colors">Entendi, adicionar</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Core Components ---
        const KickChatEmbed = ({ streamName }) => {
            const [status, setStatus] = useState('loaded');
            return (
                <div className="w-full h-full relative group/kick bg-[#0b0e11] flex flex-col overflow-hidden">
                    <iframe 
                        src={`https://kick.com/popout/${streamName}/chat`} 
                        className="w-full h-full border-none bg-[#0b0e11]" 
                        referrerPolicy="no-referrer"
                        allow="storage-access-by-user-activation; clipboard-write; web-share"
                        sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-storage-access-by-user-activation"
                    ></iframe>
                </div>
            );
        };

        const ChatCard = ({ chat, allChats, onRemove, isHidden, isFocused, onFocus, onAddClick, layoutMode, setLayoutMode }) => {
            const [refreshKey, setRefreshKey] = useState(0);

            const getTwitchUrl = (name) => {
                const parents = [hostname, 'localhost', '127.0.0.1'];
                const uniqueParents = [...new Set(parents.filter(Boolean))];
                const parentQuery = uniqueParents.map(p => `parent=${p}`).join('&');
                return `https://www.twitch.tv/embed/${name}/chat?${parentQuery}&darkpopout`;
            };

            const pColor = PLATFORMS[chat.platform].color;
            const pIcon = PLATFORMS[chat.platform].icon;

            return (
                <div className={`chat-card group animate-slide-up ${isHidden ? 'chat-hidden' : ''} ${isFocused ? 'chat-focused' : ''}`}>
                    {/* Cabeçalho Melhorado do ChatCard */}
                    <div className="h-14 bg-[#121215] border-b border-white/5 flex items-center justify-between px-3 md:px-4 shrink-0 z-20">
                        
                        {/* Esquerda: Info do Chat Atual + Alternadores + Add */}
                        <div className="flex items-center gap-2 overflow-x-auto hide-scroll w-full mr-2 fade-mask py-1">
                            
                            {/* Chat Atual (Maior e Mais Visível) */}
                            <div className={`flex items-center justify-center w-8 h-8 rounded-lg bg-white/5 shrink-0 shadow-inner border border-white/5 ${pColor}`}>
                                <div className="scale-125">{pIcon}</div>
                            </div>
                            <span className="text-base md:text-lg font-bold text-white tracking-wide shrink-0 ml-1">
                                {chat.originalName || chat.name}
                            </span>

                            {/* Alternador de Abas (Só aparece no Modo Foco se houverem + chats) */}
                            {isFocused && allChats.length > 1 && (
                                <React.Fragment>
                                    <div className="w-px h-6 bg-white/10 shrink-0 mx-2"></div>
                                    {allChats.filter(c => c.id !== chat.id).map(otherChat => {
                                        const oPlatform = PLATFORMS[otherChat.platform];
                                        return (
                                            <button
                                                key={otherChat.id}
                                                onClick={() => onFocus(otherChat.id)}
                                                className={`flex items-center justify-center w-8 h-8 rounded-full bg-white/5 border border-transparent hover:border-white/20 transition-all ${oPlatform.color} shrink-0 opacity-60 hover:opacity-100 shadow-sm`}
                                                title={`Alternar para ${otherChat.originalName || otherChat.name}`}
                                            >
                                                {oPlatform.icon}
                                            </button>
                                        );
                                    })}
                                </React.Fragment>
                            )}

                            {/* Botão Adicionar Chat embutido no Card */}
                            <div className="w-px h-6 bg-white/10 shrink-0 mx-2"></div>
                            <button
                                onClick={onAddClick}
                                className="flex items-center justify-center h-8 px-3 gap-1.5 rounded-full bg-white/5 hover:bg-white/15 text-white transition-colors shrink-0 border border-white/5"
                                title="Adicionar Novo Chat"
                            >
                                <PlusIcon size={16} />
                                <span className="text-[11px] font-bold uppercase tracking-wider hidden sm:block">Add</span>
                            </button>

                        </div>

                        {/* Direita: Ações de Layout e Ferramentas */}
                        <div className="flex items-center gap-1.5 shrink-0 pl-2">
                            
                            {/* Alternadores de Layout Embutidos (Escondidos em telas muito pequenas) */}
                            <div className="hidden sm:flex items-center bg-black/40 rounded-full border border-white/5 p-0.5 mr-1">
                                <button onClick={() => setLayoutMode('grid')} className={`p-1.5 rounded-full transition-all ${layoutMode === 'grid' ? 'bg-white text-black shadow' : 'text-gray-400 hover:text-white hover:bg-white/10'}`} title="Modo Grade"><GridIcon /></button>
                                <button onClick={() => setLayoutMode('list')} className={`p-1.5 rounded-full transition-all hidden md:block ${layoutMode === 'list' ? 'bg-white text-black shadow' : 'text-gray-400 hover:text-white hover:bg-white/10'}`} title="Modo Lista Vertical"><ListIcon /></button>
                                <button onClick={() => setLayoutMode('focus')} className={`p-1.5 rounded-full transition-all ${layoutMode === 'focus' ? 'bg-white text-black shadow' : 'text-gray-400 hover:text-white hover:bg-white/10'}`} title="Modo Foco Tela Cheia"><FocusIcon /></button>
                            </div>

                            {/* Alternador Layout Mobile (Simplificado) */}
                            <button onClick={() => setLayoutMode(layoutMode === 'focus' ? 'grid' : 'focus')} className="p-2 text-gray-400 hover:text-white bg-black/40 rounded-lg border border-white/5 sm:hidden transition-colors">
                                {layoutMode === 'focus' ? <GridIcon /> : <FocusIcon />}
                            </button>

                            {/* Ferramentas Básicas */}
                            <button onClick={() => setRefreshKey(k => k + 1)} className="p-2 hover:text-white hover:bg-white/10 rounded-lg transition-colors hidden sm:block" title="Recarregar"><RefreshIcon /></button>
                            <button onClick={() => {
                                let url = chat.platform === 'twitch' ? `https://www.twitch.tv/popout/${chat.name}/chat` : chat.platform === 'kick' ? `https://kick.com/popout/${chat.name}/chat` : `https://www.youtube.com/live_chat?v=${chat.ytVideoId || chat.name}`;
                                window.open(url, `chat-${chat.id}`, "width=400,height=600");
                            }} className="p-2 hover:text-ice hover:bg-white/10 rounded-lg transition-colors hidden sm:block" title="Popout (Janela Nativa)"><ExternalLinkIcon /></button>
                            
                            {/* Botão Fechar Chat */}
                            <button onClick={() => onRemove(chat.id)} className="p-2 text-red-400 hover:text-white hover:bg-red-500/80 rounded-lg transition-colors ml-1" title="Fechar Chat"><TrashIcon /></button>
                        </div>
                    </div>
                    
                    {/* Renderizador do Iframe */}
                    <div className="flex-1 relative bg-[#09090b] flex items-center justify-center">
                        {chat.platform === 'youtube' && chat.isSearching ? (
                            <div className="text-center animate-pulse-glow flex flex-col items-center gap-2 opacity-50">
                                <SearchIcon /> <span className="text-xs text-gray-400">Buscando live de {chat.originalName}...</span>
                            </div>
                        ) : chat.platform === 'youtube' && !chat.ytVideoId && chat.originalName?.startsWith('@') ? (
                            <div className="text-center flex flex-col items-center gap-2 opacity-50">
                                <EyeOffIcon /> <span className="text-xs text-gray-500">Offline ou Não Encontrado</span>
                            </div>
                        ) : chat.platform === 'kick' ? (
                            <KickChatEmbed key={refreshKey} streamName={chat.name} />
                        ) : chat.platform === 'twitch' ? (
                            <iframe key={refreshKey} src={getTwitchUrl(chat.name)} className="w-full h-full border-none" allow="storage-access-by-user-activation; clipboard-write; web-share" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-storage-access-by-user-activation allow-modals"></iframe>
                        ) : (
                            <iframe key={refreshKey} src={`https://www.youtube.com/live_chat?v=${chat.ytVideoId || chat.name}&embed_domain=${hostname}`} className="w-full h-full border-none" allow="storage-access-by-user-activation; clipboard-write; web-share; autoplay" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-storage-access-by-user-activation"></iframe>
                        )}
                    </div>
                </div>
            );
        };

        const HeroBrand = ({ hasChats }) => {
            return (
                <div className={`logo-container ${hasChats ? 'logo-hidden' : 'logo-normal'}`}>
                     <div className="flex items-center gap-3">
                        <div className="w-10 h-10 md:w-12 md:h-12 tech-gradient rounded-xl flex items-center justify-center text-white shadow-[0_0_20px_rgba(99,102,241,0.3)] ring-1 ring-white/20">
                            <LogoML />
                        </div>
                        <div className="flex flex-col text-left">
                            <h1 className="font-bold text-xl md:text-2xl tracking-tight text-white leading-none font-display">MULTICHATS</h1>
                            <span className="text-[8px] uppercase tracking-[0.3em] text-gray-400 font-semibold mt-1 ml-0.5">Streaming Hub</span>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main App ---
        const App = () => {
            const [chats, setChats] = useState([]);
            const [layoutMode, setLayoutMode] = useState("grid");
            const [focusedId, setFocusedId] = useState(null);
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [showYtWarning, setShowYtWarning] = useState(false);
            
            // Estados para a tela de Loading
            const [isLoading, setIsLoading] = useState(true);
            const [isFadingOutLoading, setIsFadingOutLoading] = useState(false);

            // Sequência de animação de Loading na montagem
            useEffect(() => {
                const timer1 = setTimeout(() => setIsFadingOutLoading(true), 2000); // Começa a desaparecer após 2s
                const timer2 = setTimeout(() => setIsLoading(false), 2700); // Remove completamente do DOM após o fade
                return () => { clearTimeout(timer1); clearTimeout(timer2); };
            }, []);

            // Carregar do localStorage
            useEffect(() => {
                const saved = localStorage.getItem('multichats-data');
                if(saved) { try { setChats(JSON.parse(saved)); } catch(e) {} }
                const savedLayout = localStorage.getItem('multichats-layout');
                if(savedLayout) setLayoutMode(savedLayout);
            }, []);

            useEffect(() => { localStorage.setItem('multichats-data', JSON.stringify(chats)); }, [chats]);
            useEffect(() => { localStorage.setItem('multichats-layout', layoutMode); }, [layoutMode]);

            // YouTube Auto-Discovery (Sistema Duplo Seguro)
            const checkYTLive = async (handle) => {
                const clean = handle.replace('@', '');
                const targetUrl = `https://www.youtube.com/@${clean}/live`;
                
                try {
                    const res = await fetch(`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(targetUrl)}`);
                    const html = await res.text();
                    const canonicalMatch = html.match(/<link rel="canonical" href="https:\/\/www.youtube.com\/watch\?v=([a-zA-Z0-9_-]{11})"/);
                    if (canonicalMatch && canonicalMatch[1]) return canonicalMatch[1];
                } catch(e) {}
                
                try {
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
                    const res2 = await fetch(proxyUrl);
                    const data = await res2.json();
                    if (data && data.contents) {
                        const canonicalMatch = data.contents.match(/<link rel="canonical" href="https:\/\/www.youtube.com\/watch\?v=([a-zA-Z0-9_-]{11})"/);
                        if (canonicalMatch && canonicalMatch[1]) return canonicalMatch[1];
                    }
                } catch(e) {}
                
                return null;
            };

            useEffect(() => {
                const interval = setInterval(async () => {
                    const ytHandles = chats.filter(c => c.platform === 'youtube' && c.originalName?.startsWith('@'));
                    for(const chat of ytHandles) {
                        const liveId = await checkYTLive(chat.originalName);
                        setChats(prev => prev.map(c => c.id === chat.id ? { ...c, ytVideoId: liveId, isSearching: false } : c));
                    }
                }, 60000);
                return () => clearInterval(interval);
            }, [chats]);

            const handleAddChat = async (platform, inputStr) => {
                let name = inputStr.trim();
                let originalName = name;
                let ytVideoId = null;
                let isSearching = false;
                
                if(platform === 'youtube') {
                    const ytRegex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?|live)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
                    const match = name.match(ytRegex);

                    if (match && match[1]) {
                        ytVideoId = match[1]; name = match[1]; originalName = name;
                    } else if (/^[a-zA-Z0-9_-]{11}$/.test(name)) {
                        ytVideoId = name; originalName = name;
                    } else {
                        isSearching = true;
                        let handle = name;
                        const handleMatch = handle.match(/youtube\.com\/(@[a-zA-Z0-9_-]+)/);
                        if (handleMatch) handle = handleMatch[1];
                        else if (!handle.startsWith('@')) handle = '@' + handle;
                        originalName = handle; name = handle;
                    }
                } else {
                    name = name.toLowerCase().replace('@', '');
                    if (platform === 'twitch') {
                        const twMatch = name.match(/twitch\.tv\/([a-zA-Z0-9_]+)/);
                        if (twMatch) name = twMatch[1];
                    } else if (platform === 'kick') {
                        const kickMatch = name.match(/kick\.com\/([a-zA-Z0-9_]+)/);
                        if (kickMatch) name = kickMatch[1];
                    }
                    originalName = name;
                }

                if(chats.some(c => (c.name === name || c.originalName === originalName) && c.platform === platform)) {
                    alert("Este chat já está aberto!"); return;
                }

                const newChat = { id: Date.now(), name, originalName, platform, ytVideoId, isSearching };

                setChats(prev => [...prev, newChat]);
                setIsAddModalOpen(false);

                // Alterna automaticamente para o novo chat em Modo Foco
                setLayoutMode('focus');
                setFocusedId(newChat.id);

                if(isSearching) {
                    const liveId = await checkYTLive(originalName);
                    setChats(prev => prev.map(c => c.id === newChat.id ? { ...c, ytVideoId: liveId, isSearching: false } : c));
                }
            };

            const removeChat = (id) => {
                setChats(prev => {
                    const next = prev.filter(c => c.id !== id);
                    if (focusedId === id) setFocusedId(next.length > 0 ? next[0].id : null);
                    if (next.length === 1) { setLayoutMode('focus'); setFocusedId(next[0].id); }
                    return next;
                });
            };

            return (
                <div className="relative min-h-screen w-full bg-[#09090b] text-gray-100 font-sans overflow-hidden">
                    
                    {/* Componente de Loading Inicial */}
                    {isLoading && <LoadingScreen isFadingOut={isFadingOutLoading} />}

                    {/* Background Effects */}
                    <div className="absolute inset-0 z-0 pointer-events-none">
                        <div className="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] rounded-full bg-[#6366f1]/10 blur-[150px] animate-aurora-1 mix-blend-screen"></div>
                        <div className="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] rounded-full bg-[#a5f3fc]/10 blur-[150px] animate-aurora-2 mix-blend-screen"></div>
                    </div>

                    <HeroBrand hasChats={chats.length > 0} />
                    
                    {/* Modais */}
                    <AddChatModal isOpen={isAddModalOpen} onClose={() => setIsAddModalOpen(false)} onAdd={handleAddChat} />
                    <YoutubeWarningModal isOpen={showYtWarning} onClose={() => setShowYtWarning(false)} onConfirm={() => {
                        handleAddChat('youtube', 'y4tPb3eYiAQ');
                        setShowYtWarning(false);
                    }} />

                    {/* Chat Container (Aplica o Empty State Centrado se não houver chats) */}
                    <div className={`chat-container hide-scroll ${chats.length === 0 ? 'empty-state' : 'active-state'} ${layoutMode === 'grid' ? 'mode-grid' : layoutMode === 'list' ? 'mode-list' : 'mode-focus'}`}>
                        
                        {chats.length === 0 ? (
                            /* ESTADO VAZIO: Centralizado na tela */
                            <div className="flex flex-col items-center justify-center h-full gap-4 w-full animate-fade-in relative z-10">
                                <button 
                                    onClick={() => setIsAddModalOpen(true)}
                                    className="bg-[#121215]/80 backdrop-blur-xl border border-white/10 shadow-2xl rounded-full px-8 py-5 flex items-center gap-4 hover:scale-105 hover:bg-white/5 hover:border-white/20 transition-all duration-300 group"
                                >
                                    <div className="w-10 h-10 rounded-full bg-white text-black flex items-center justify-center group-hover:rotate-90 transition-transform duration-300">
                                        <PlusIcon size={22} />
                                    </div>
                                    <span className="font-extrabold text-lg tracking-wide text-white">Adicionar Chat</span>
                                    <div className="flex items-center gap-2.5 ml-2 pl-4 border-l border-white/10">
                                        <span className="text-[#9146ff]"><TwitchIcon width={22} height={22}/></span>
                                        <span className="text-[#53fc18]"><KickIcon width={22} height={22}/></span>
                                        <span className="text-[#ff0000]"><YoutubeIcon width={22} height={22}/></span>
                                    </div>
                                </button>
                                
                                <div className="flex gap-3 items-center opacity-50 mt-2">
                                    <span className="text-[10px] uppercase font-bold text-gray-400">Sugestões Rápidas:</span>
                                    <button onClick={() => handleAddChat('twitch', 'jonvlogs')} className="text-xs text-[#9146ff] hover:text-white hover:underline transition-all font-bold">JonVlogs (Twitch)</button>
                                    <button onClick={() => handleAddChat('youtube', '@jonvlogs')} className="text-xs text-[#ff0000] hover:text-white hover:underline transition-all font-bold">JonVlogs (YouTube)</button>
                                </div>
                            </div>
                        ) : (
                            /* CARDS DE CHAT ATIVOS */
                            chats.map(chat => (
                                <ChatCard 
                                    key={chat.id} 
                                    chat={chat} 
                                    allChats={chats} 
                                    onRemove={removeChat}
                                    onAddClick={() => setIsAddModalOpen(true)}
                                    layoutMode={layoutMode}
                                    setLayoutMode={setLayoutMode}
                                    isHidden={layoutMode === 'focus' && focusedId !== chat.id}
                                    isFocused={layoutMode === 'focus' && focusedId === chat.id}
                                    onFocus={(id) => { setLayoutMode('focus'); setFocusedId(id); }}
                                />
                            ))
                        )}
                    </div>

                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
